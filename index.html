<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Charter — v2, the squad ages</title>
<style>
  /* ---------- LOOK AND FEEL. Edit colors and sizes here. ---------- */
  :root {
    --bg:#14110f; --panel:#1f1a17; --ink:#f2ece4; --muted:#9b8f80;
    --accent:#c8442e; --line:#36302a; --good:#6fae6a; --gold:#d8a93a;
  }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { margin:0; background:var(--bg); color:var(--ink);
    font-family:Georgia,'Times New Roman',serif; line-height:1.5;
    display:flex; justify-content:center; }
  #app { width:100%; max-width:430px; min-height:100vh; padding:16px 16px 28px;
    display:flex; flex-direction:column; }

  header { text-align:center; margin-bottom:10px; }
  header h1 { font-size:18px; margin:0; letter-spacing:.5px; }
  header .year { color:var(--muted); font-size:13px; margin-top:2px; }

  .meters { display:flex; flex-direction:column; gap:7px; margin-bottom:12px; }
  .row { display:flex; justify-content:space-between; font-size:12px; color:var(--muted); margin-bottom:2px; }
  .row .val { color:var(--ink); }
  .bar { height:7px; background:var(--line); border-radius:4px; overflow:hidden; }
  .bar > span { display:block; height:100%; background:var(--accent); transition:width .5s ease; }

  /* The squad strip. */
  .squad { background:var(--panel); border:1px solid var(--line); border-radius:10px;
    padding:10px 12px; margin-bottom:12px; }
  .squad h3 { margin:0 0 8px; font-size:12px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; font-weight:normal; }
  .player { display:flex; justify-content:space-between; font-size:13px; padding:3px 0; }
  .player .tag { color:var(--muted); font-size:11px; }
  .player.foreign .tag { color:var(--accent); }
  .strength { margin-top:8px; padding-top:8px; border-top:1px solid var(--line);
    display:flex; justify-content:space-between; font-size:13px; }
  .strength b { color:var(--gold); }

  .card { background:var(--panel); border:1px solid var(--line); border-radius:14px;
    padding:18px 16px; flex:1; display:flex; flex-direction:column; }
  .sp { color:var(--accent); font-size:12px; text-transform:uppercase; letter-spacing:1px; margin-bottom:10px; }
  .pr { font-size:16px; flex:1; }
  .ch { display:flex; flex-direction:column; gap:9px; margin-top:14px; }
  button.c { width:100%; min-height:50px; background:transparent; color:var(--ink);
    border:1px solid var(--accent); border-radius:10px; padding:11px 13px;
    font-family:inherit; font-size:14px; text-align:left; cursor:pointer; }
  button.c:active { background:rgba(200,68,46,0.15); }
  button.c small { display:block; color:var(--muted); font-size:11px; margin-top:3px; }
  .fo { margin-top:12px; font-size:13px; color:var(--muted); font-style:italic; min-height:18px; }
  .roll { margin-top:10px; font-size:13px; }
  .roll > div { padding:2px 0; text-align:center; }
  .roll .win { color:var(--gold); }
  .roll .lose { color:var(--muted); }
  .nx { margin-top:14px; align-self:center; background:var(--accent); color:#fff; border:none;
    border-radius:10px; padding:11px 26px; font-family:inherit; font-size:15px; cursor:pointer; display:none; }
  #ending { display:none; }
  #ending h2 { color:var(--accent); font-size:20px; }
  .replay { margin-top:18px; background:transparent; color:var(--ink); border:1px solid var(--accent);
    border-radius:10px; padding:11px 22px; font-family:inherit; font-size:15px; cursor:pointer; }
</style>
</head>
<body>
<div id="app">
  <header><h1>The Charter</h1><div class="year" id="year">Bilbao · 1900</div></header>
  <div class="meters" id="meters"></div>
  <div class="squad" id="squadBox"></div>
  <div class="card" id="card">
    <div class="sp" id="sp"></div>
    <div class="pr" id="pr"></div>
    <div class="ch" id="ch"></div>
    <div class="fo" id="fo"></div>
    <div class="roll" id="rollOut"></div>
    <button class="nx" id="nx">Play the season →</button>
  </div>
  <div id="ending"><h2 id="et"></h2><p id="eb" style="font-size:16px;"></p>
    <p id="ec" style="font-size:12px; color:var(--muted); margin-top:6px;"></p>
    <button class="replay" id="rp">Play again</button></div>
</div>

<script>
/* =========================================================================
   FOUNDING — three pre-game choices that bend the whole century.
   Region amplifies costs unconditionally. Story and rule amplify by tag.
   All modifiers stack multiplicatively, so combinations compound.
   ========================================================================= */

const REGIONS = {
  enclave: {
    name:"Basque enclave", place:"Bilbao",
    flavor:"A region with its own language and its own memory. Your players are the argument the culture survives.",
    start:{ money:35, soul:75, fans:60 },
    squad:[
      { name:"Zubizarreta", age:33, rating:10, foreign:false },
      { name:"Larrauri",    age:31, rating:11, foreign:false },
      { name:"Aguirre",     age:28, rating:14, foreign:false },
      { name:"Mendieta",    age:27, rating:13, foreign:false },
      { name:"Goikoetxea",  age:26, rating:13, foreign:false },
      { name:"Llorente",    age:25, rating:12, foreign:false },
      { name:"Ziganda",     age:29, rating:12, foreign:false },
      { name:"Orbaiz",      age:24, rating:12, foreign:false },
      { name:"Alkiza",      age:30, rating:11, foreign:false },
      { name:"Etxeberria",  age:27, rating:13, foreign:false },
      { name:"Urzaiz",      age:26, rating:12, foreign:false },
      { name:"Luengo",      age:23, rating:11, foreign:false },
      { name:"Sota",        age:22, rating:10, foreign:false },
      { name:"Bilbao",      age:21, rating:10, foreign:false },
      { name:"Iraola",      age:20, rating:9,  foreign:false },
      { name:"Garai",       age:19, rating:9,  foreign:false },
      { name:"Ozaeta",      age:18, rating:8,  foreign:false },
      { name:"Beristain",   age:17, rating:8,  foreign:false },
      { name:"Larrazabal",  age:19, rating:9,  foreign:false },
      { name:"Mugica",      age:18, rating:8,  foreign:false },
    ],
    youthPool:["Garai","Ozaeta","Beristain","Iraola","Etxebarria","Bilbao","Larrazabal","Mugica","Iribar","Uribe","Rekarte","Agirre","Zubikarai","Arteaga","Aduriz","Susaeta","Lekue","Villalibre","Unai","Mikel"],
    // Every soul loss costs 50% more — identity is the enclave's currency.
    mod:(d)=>{ if(d.soul<0) d.soul=Math.round(d.soul*1.5); }
  },
  milltown: {
    name:"Northern mill town", place:"Bradford",
    flavor:"Built on the factory whistle and the shift change. The men who built this club still work the same jobs their fathers did.",
    start:{ money:30, soul:60, fans:80 },
    squad:[
      { name:"Southall",    age:33, rating:10, foreign:false },
      { name:"Crawford",    age:31, rating:11, foreign:false },
      { name:"Fletcher",    age:28, rating:14, foreign:false },
      { name:"Cooper",      age:27, rating:13, foreign:false },
      { name:"Sugden",      age:26, rating:13, foreign:false },
      { name:"Briggs",      age:25, rating:12, foreign:false },
      { name:"Hartley",     age:29, rating:12, foreign:false },
      { name:"Crowther",    age:24, rating:12, foreign:false },
      { name:"Emmott",      age:30, rating:11, foreign:false },
      { name:"Mallinson",   age:27, rating:13, foreign:false },
      { name:"Holdsworth",  age:26, rating:12, foreign:false },
      { name:"Mills",       age:23, rating:11, foreign:false },
      { name:"Shaw",        age:22, rating:10, foreign:false },
      { name:"Thornton",    age:21, rating:10, foreign:false },
      { name:"Whitaker",    age:20, rating:9,  foreign:false },
      { name:"Greenwood",   age:19, rating:9,  foreign:false },
      { name:"Barraclough", age:18, rating:8,  foreign:false },
      { name:"Ainsworth",   age:17, rating:8,  foreign:false },
      { name:"Howarth",     age:19, rating:9,  foreign:false },
      { name:"Sutcliffe",   age:18, rating:8,  foreign:false },
    ],
    youthPool:["Hartley","Briggs","Sugden","Crowther","Mallinson","Emmott","Holdsworth","Thornton","Whitaker","Greenwood","Barraclough","Ainsworth","Howarth","Sutcliffe","Dewhurst","Longbottom","Beaumont","Sykes","Priestley","Firth"],
    // Every fan loss costs 50% more — the community doesn't forgive as easily.
    mod:(d)=>{ if(d.fans<0) d.fans=Math.round(d.fans*1.5); }
  }
};

const STORIES = {
  cooperative: {
    name:"Workers' cooperative",
    flavor:"Every member holds a vote. The club belongs to no one person. The charter says so.",
    bonus:{ soul:10 },
    // Surrendering control costs 40% more soul.
    mod:(d,tags)=>{ if(tags.includes('ownership')&&d.soul<0) d.soul=Math.round(d.soul*1.4); }
  },
  students: {
    name:"Students' club",
    flavor:"Founded by idealists with more conviction than money. The principles came first. The trophies were always secondary.",
    bonus:{ money:10 },
    // Commercial compromises cost 40% more soul.
    mod:(d,tags)=>{ if(tags.includes('commercial')&&d.soul<0) d.soul=Math.round(d.soul*1.4); }
  }
};

const RULES = {
  local: {
    name:"No outsiders",
    note:"Only players from this region wear our shirt. The rule goes in the charter.",
    bonus:{ soul:10 },
    // Breaking it costs 50% more soul. Holding it earns extra soul and fans.
    mod:(d,tags)=>{
      if(tags.includes('outsider')&&d.soul<0) d.soul=Math.round(d.soul*1.5);
      if(tags.includes('outsider-hold')){ d.soul=(d.soul||0)+10; d.fans=(d.fans||0)+5; }
    }
  },
  ownership: {
    name:"Fan ownership",
    note:"One member, one vote. The club can never be sold without a majority ballot.",
    bonus:{ fans:10 },
    // Selling control costs 40% more soul and 30% more fans. Refusing earns extra.
    mod:(d,tags)=>{
      if(tags.includes('ownership')&&d.soul<0){
        d.soul=Math.round(d.soul*1.4);
        if(d.fans<0) d.fans=Math.round(d.fans*1.3);
      }
      if(tags.includes('ownership-hold')){ d.soul=(d.soul||0)+10; d.fans=(d.fans||0)+10; }
    }
  }
};

/* =========================================================================
   ENGINE
   ========================================================================= */

let meters = { money:0, soul:0, fans:0 };
const meterLabels = { money:"Money", soul:"Soul", fans:"Fans" };
let squad = [];
let trophies = 0;
let charterBroken = false;
let current = 0;
let seasonsLeft = 0;
let seasonInEra = 0;
let founding = { region:null, story:null, rule:null };
let foundingStep = 0;

function strength(){ return squad.reduce((s,p)=>s+p.rating,0); }

function passEra(){
  squad.forEach(p=>{ p.age+=8; if(p.age>30) p.rating-=3; });
  squad=squad.filter(p=>p.age<=36&&p.rating>0);
  const youthRating=Math.round(8+(meters.soul/100)*6+(meters.money/100)*3);
  // Add 4 youth per era to keep the squad near 20.
  for(let i=0;i<4;i++){
    squad.push({ name:youthName(), age:19, rating:Math.max(6,youthRating+(i===0?1:0)), foreign:false });
  }
}

let namei=0;
function youthName(){
  const pool=REGIONS[founding.region].youthPool;
  return pool[(namei++)%pool.length];
}

function playSeason(){
  const s=strength();
  // 20-player squads: typical ~215 str. Steep curve, cap at 50%.
  // 160 = depleted; 215 = typical; 280+ = stacked with stars.
  let chance=Math.min(0.50,Math.max(0.03,(s-160)/280));
  return { won:Math.random()<chance, chance, strength:s };
}

function clamp(n){ return Math.max(0,Math.min(100,n)); }

function applyModifiers(delta,tags){
  REGIONS[founding.region].mod(delta);
  STORIES[founding.story].mod(delta,tags);
  RULES[founding.rule].mod(delta,tags);
}

/* =========================================================================
   FOUNDING FLOW — shown before the first scene
   ========================================================================= */

const foundingFlow = [
  { sp:"1 of 3 · The ground", pr:"Your club is about to be born. First: where?",
    choices:[{group:'region',key:'enclave'},{group:'region',key:'milltown'}] },
  { sp:"2 of 3 · The founders", pr:"Who built this club, and why?",
    choices:[{group:'story',key:'cooperative'},{group:'story',key:'students'}] },
  { sp:"3 of 3 · The charter", pr:"One rule goes in the founding document. The century will spend a hundred years trying to make you break it.",
    choices:[{group:'rule',key:'local'},{group:'rule',key:'ownership'}] },
];

function getFoundingData(group,key){
  return group==='region'?REGIONS[key]:group==='story'?STORIES[key]:RULES[key];
}

function pickFounding(group,key){
  founding[group]=key;
  foundingStep++;
  if(foundingStep>=foundingFlow.length) showFoundingSummary();
  else showFoundingStep();
}

function showFoundingStep(){
  const f=foundingFlow[foundingStep];
  document.getElementById("meters").style.display="none";
  document.getElementById("squadBox").style.display="none";
  document.getElementById("year").textContent="1900 · Before the first season";
  document.getElementById("sp").textContent=f.sp;
  document.getElementById("pr").textContent=f.pr;
  document.getElementById("fo").textContent="";
  document.getElementById("rollOut").innerHTML="";
  document.getElementById("nx").style.display="none";
  const c=document.getElementById("ch"); c.innerHTML="";
  f.choices.forEach(o=>{
    const opt=getFoundingData(o.group,o.key);
    const b=document.createElement("button"); b.className="c";
    b.innerHTML=`${opt.name}<small>${opt.flavor||opt.note}</small>`;
    b.onclick=()=>pickFounding(o.group,o.key);
    c.appendChild(b);
  });
}

function showFoundingSummary(){
  const r=REGIONS[founding.region], s=STORIES[founding.story], ru=RULES[founding.rule];
  document.getElementById("year").textContent="1900 · Before the first season";
  document.getElementById("sp").textContent="Your club";
  document.getElementById("pr").textContent=`${r.place}. ${s.name}. Charter: ${ru.name}.`;
  document.getElementById("fo").textContent=r.flavor;
  document.getElementById("rollOut").innerHTML="";
  const c=document.getElementById("ch"); c.innerHTML="";
  const b=document.createElement("button"); b.className="c";
  b.textContent="Begin the century →";
  b.onclick=initGame;
  c.appendChild(b);
}

function initGame(){
  const r=REGIONS[founding.region], s=STORIES[founding.story], ru=RULES[founding.rule];
  meters.money=r.start.money+(s.bonus.money||0)+(ru.bonus.money||0);
  meters.soul =r.start.soul +(s.bonus.soul||0) +(ru.bonus.soul||0);
  meters.fans =r.start.fans +(s.bonus.fans||0) +(ru.bonus.fans||0);
  squad=r.squad.map(p=>({...p}));
  namei=0;
  document.getElementById("meters").style.display="";
  document.getElementById("squadBox").style.display="";
  showScene();
}

/* =========================================================================
   SCENES
   Tags: 'outsider' / 'outsider-hold' — signing or refusing foreign players
         'ownership' / 'ownership-hold' — ceding or defending control
         'commercial' — prioritising revenue over identity
   ========================================================================= */

const scenes = [
  { sp:"The war office", year:"{PLACE} · 1914", seasons:3,
    pr:"The telegram has been circulating for weeks. Half your squad has already enlisted. The league says play on. Will you release the rest to serve, or petition to keep them?",
    ch:[
      { t:"Release them. Let them go.",
        note:"The club empties. Soul holds.", tags:[],
        run:()=>{ meters.soul+=20; meters.fans+=10;
          // Release the three best local players to serve.
          for(let n=0;n<3;n++){
            let best=-1,bestR=-1;
            squad.forEach((p,i)=>{ if(!p.foreign&&p.rating>bestR){bestR=p.rating;best=i;} });
            if(best>=0) squad.splice(best,1);
          }
        } },
      { t:"Petition to keep the squad together. The league needs clubs.",
        note:"You play on. The neighbourhood never forgets.", tags:['commercial'],
        run:()=>{ meters.money+=10; meters.soul-=10; meters.fans-=25; } },
    ] },

  { sp:"The board", year:"{PLACE} · 1930s", seasons:6,
    pr:"Your senior men are ageing. Pour money into the academy now, or save it?",
    ch:[
      { t:"Fund the academy.", note:"Costs money. Future locals get better.", tags:[],
        run:()=>{ meters.money-=15; meters.soul+=10; squad.forEach(p=>{ if(p.age<25)p.rating+=2; }); } },
      { t:"Save the money.", note:"Coffers stay full. The pipeline runs dry.", tags:[],
        run:()=>{ meters.money+=10; meters.soul-=5; } },
    ] },

  { sp:"The broadcaster", year:"{PLACE} · 1950", seasons:6,
    pr:"The national broadcaster wants to carry your home matches live. Your board says the terraces will empty. The broadcaster says the whole country will know your name.",
    ch:[
      { t:"Sign the deal.", note:"The money comes in. The ground starts to thin.", tags:['commercial'],
        run:()=>{ meters.money+=15; meters.fans-=15; meters.soul-=5; } },
      { t:"Refuse. The gate is the club.", note:"The terraces stay full. The money stays small.", tags:[],
        run:()=>{ meters.money-=10; meters.fans+=10; meters.soul+=5; } },
    ] },

  { sp:"The camera crew", year:"{PLACE} · 1965", seasons:6,
    pr:"Television money is different from radio money. They want to move your Saturday match to Sunday evening for a bigger audience. You'd earn more than a decade of gate receipts. The men who stand behind the goal have worked Sundays since 1945.",
    ch:[
      { t:"Take the money. Shift the kick-off.", note:"The cheque clears. The old supporters drift away.", tags:['commercial'],
        run:()=>{ meters.money+=25; meters.fans-=25; meters.soul-=5; } },
      { t:"Refuse. Saturday is Saturday.", note:"The money goes elsewhere. The faithful stay.", tags:[],
        run:()=>{ meters.money-=15; meters.soul+=15; meters.fans+=10; } },
    ] },

  { sp:"The terraces", year:"{PLACE} · 1975", seasons:5,
    pr:"The supporters' association has drafted a proposal: two seats on the board, one vote in three. They say the club was built with their money and their fathers' money before that. The board says it will slow everything down.",
    ch:[
      { t:"Grant it. The board belongs to them too.", note:"Decisions slow. The supporters become the club.", tags:['ownership-hold'],
        run:()=>{ meters.soul+=15; meters.fans+=20; meters.money-=10; } },
      { t:"Refuse. Governance is for governors.", note:"The board stays clean. Something sours on the terraces.", tags:['ownership'],
        run:()=>{ meters.soul-=8; meters.fans-=25; meters.money+=10; } },
    ] },

  { sp:"The inquiry", year:"{PLACE} · 1985", seasons:5,
    pr:"A crush in the old wooden stand. Three supporters dead, dozens hurt. The safety report says the ground must close or be rebuilt. A developer has land on the edge of town and will fund a new stadium if you move.",
    ch:[
      { t:"Take the developer's money. Build new, build out of town.", note:"The money solves the problem. The neighbourhood is left behind.", tags:['commercial','ownership'],
        run:()=>{ meters.money+=20; meters.fans-=35; meters.soul-=8; } },
      { t:"Rebuild the old ground. Stay where you are.", note:"It costs everything. The ground is still yours.", tags:[],
        run:()=>{ meters.money-=25; meters.fans+=15; meters.soul+=15; } },
    ] },

  { sp:"The agent", year:"{PLACE} · 1995 · the Bosman ruling", seasons:5,
    pr:`A court freed players to cross borders cheap. Your best men are old and the academy is thin. Strength is just ${'${STR}'}. Sign a foreign star?`,
    ch:[
      { t:"Sign him. Break the charter, just once.", note:"+ a strong outsider. Soul falls hard. The dice tilt your way.", tags:['outsider'],
        run:()=>{ squad.push({name:"da Silva",age:26,rating:16,foreign:true}); squad.push({name:"Cardoso",age:24,rating:15,foreign:true}); meters.soul-=30; meters.money-=10; charterBroken=true; } },
      { t:"Hold the line. Local only, whatever it costs.", note:"Soul holds. You go into the season as a long shot.", tags:['outsider-hold'],
        run:()=>{ meters.soul+=15; meters.fans+=10; } },
    ] },

  { sp:"The consortium", year:"{PLACE} · 2005", seasons:5,
    pr:`A media consortium will finance a title challenge: signings, wages, a new training ground. Strength is ${'${STR}'}. The repayment terms are generous until the revenue projections miss. Clubs have done this and won. Some have since ceased to exist.`,
    ch:[
      { t:"Take the loan. Chase the title.", note:"You buy a chance. The debt is someone else's problem — until it isn't.", tags:['ownership','commercial'],
        run:()=>{ squad.push({name:"Sánchez",age:27,rating:17,foreign:false}); meters.money+=20; meters.fans-=20; meters.soul-=5; } },
      { t:"Decline. Win with what you have or not at all.", note:"No debt. No shortcut.", tags:['ownership-hold'],
        run:()=>{ meters.soul+=15; meters.fans+=5; } },
    ] },

  { sp:"The fund", year:"{PLACE} · 2015 · the stadium era", seasons:5,
    pr:"A sovereign wealth fund will buy you and make you champions. The old ground, and the neighbourhood around it, would go.",
    ch:[
      { t:"Sell. Win at last.", note:"Money and a star striker. The community doesn't forgive.", tags:['outsider','ownership'],
        run:()=>{ squad.push({name:"Okafor",age:25,rating:18,foreign:true}); squad.push({name:"Diallo",age:23,rating:17,foreign:true}); squad.push({name:"Ferreira",age:27,rating:16,foreign:true}); meters.money+=30; meters.soul-=15; meters.fans-=35; charterBroken=true; } },
      { t:"Refuse. Stay poor, stay home, stay ours.", note:"Soul and fans hold. The dice stay long.", tags:['outsider-hold','ownership-hold'],
        run:()=>{ meters.soul+=15; meters.fans+=15; meters.money-=15; } },
    ] },

  { sp:"The invitation", year:"{PLACE} · 2020", seasons:4,
    pr:"An envelope arrives. Twelve clubs are forming a closed European competition. Guaranteed matches, guaranteed money, no promotion, no relegation. A standing invitation to the top table, forever. Your city would be on the poster.",
    ch:[
      { t:"Sign it. This is what the club has been building toward.", note:"The money is transformative. Half the supporters never come back.", tags:['ownership','commercial'],
        run:()=>{ meters.money+=30; meters.fans-=40; meters.soul-=8; charterBroken=true; } },
      { t:"Refuse. Publicly.", note:"The top table closes without you. The terraces sing your name.", tags:['ownership-hold'],
        run:()=>{ meters.soul+=20; meters.fans+=25; meters.money-=20; } },
    ] },
];

/* =========================================================================
   DRAWING
   ========================================================================= */

function drawMeters(){
  let h="";
  for(const k in meterLabels){ const v=clamp(meters[k]);
    h+=`<div><div class="row"><span>${meterLabels[k]}</span><span class="val">${Math.round(v)}</span></div><div class="bar"><span style="width:${v}%"></span></div></div>`; }
  document.getElementById("meters").innerHTML=h;
}

function drawSquad(){
  const sorted=squad.slice().sort((a,b)=>b.rating-a.rating);
  const xi=sorted.slice(0,11);
  const bench=sorted.slice(11);
  const s=strength();
  const chance=Math.min(0.50,Math.max(0.03,(s-160)/280));
  let h=`<h3>Starting XI (${squad.length} in squad) · ${trophies} trophy${trophies===1?'':'s'}<span class="tag" style="float:right;margin-top:2px">str</span></h3>`;
  xi.forEach(p=>{
    h+=`<div class="player ${p.foreign?'foreign':''}"><span>${p.name} <span class="tag">${p.age}y${p.foreign?' · foreign':''}</span></span><span>${p.rating}</span></div>`;
  });
  if(bench.length) h+=`<div style="font-size:11px;color:var(--muted);padding:3px 0">+${bench.length} on the bench</div>`;
  h+=`<div class="strength"><span>Strength <b>${s}</b></span><span>title odds ~${Math.round(chance*100)}%</span></div>`;
  document.getElementById("squadBox").innerHTML=h;
}

function showScene(){
  if(current>=scenes.length||meters.soul<=0||meters.money<=0||meters.fans<=0) return showEnding();
  const s=scenes[current];
  const place=REGIONS[founding.region].place;
  document.getElementById("year").textContent=s.year.replace('{PLACE}',place);
  document.getElementById("sp").textContent=s.sp;
  document.getElementById("pr").textContent=s.pr.replace("${STR}",strength());
  document.getElementById("fo").textContent="";
  document.getElementById("rollOut").innerHTML="";
  document.getElementById("nx").style.display="none";
  const c=document.getElementById("ch"); c.innerHTML="";
  s.ch.forEach((o,i)=>{ const b=document.createElement("button"); b.className="c";
    b.innerHTML=`${o.t}<small>${o.note||""}</small>`; b.onclick=()=>pick(i); c.appendChild(b); });
  drawMeters(); drawSquad();
}

function pick(i){
  const o=scenes[current].ch[i];
  // Snapshot, run, delta, modify — founding modifiers amplify on top.
  const before={};
  for(const k in meters) before[k]=meters[k];
  o.run();
  const tags=o.tags||[];
  const delta={};
  for(const k in meters) delta[k]=meters[k]-before[k];
  applyModifiers(delta,tags);
  for(const k in meters) meters[k]=clamp(before[k]+delta[k]);
  document.getElementById("ch").innerHTML="";
  document.getElementById("fo").textContent=o.note||"";
  document.getElementById("rollOut").innerHTML="";
  seasonsLeft=scenes[current].seasons||5;
  seasonInEra=0;
  const nx=document.getElementById("nx");
  nx.textContent=`Play season 1 of ${seasonsLeft} →`;
  nx.style.display="block";
  drawMeters(); drawSquad();
}

document.getElementById("nx").onclick=function(){
  seasonInEra++;
  seasonsLeft--;
  const r=playSeason();
  const totalForEra=scenes[current].seasons||5;
  const out=document.getElementById("rollOut");
  const line=document.createElement("div");
  if(r.won){
    trophies++;
    line.innerHTML=`<span class="win">Season ${seasonInEra} of ${totalForEra} — Champions (${Math.round(r.chance*100)}% odds)</span>`;
  } else {
    line.innerHTML=`<span class="lose">Season ${seasonInEra} of ${totalForEra} — No silverware (${Math.round(r.chance*100)}% odds)</span>`;
  }
  out.appendChild(line);
  drawSquad();
  if(seasonsLeft>0){
    this.textContent=`Play season ${seasonInEra+1} of ${totalForEra} →`;
  } else {
    this.style.display="none";
    setTimeout(()=>{ passEra(); current++; showScene(); },1400);
  }
};

function showEnding(){
  document.getElementById("card").style.display="none";
  document.getElementById("squadBox").style.display="none";
  document.getElementById("meters").style.display="none";
  document.getElementById("ending").style.display="block";
  const r=REGIONS[founding.region], s=STORIES[founding.story], ru=RULES[founding.rule];
  let t,b;
  const dead=meters.soul<=0?"soul":meters.money<=0?"money":meters.fans<=0?"fans":null;
  if(dead){
    t="The club did not survive the century.";
    b=`You ran out of ${dead}. A century needs all of it.`;
  } else if(!charterBroken&&trophies>=2){
    t="You won, and you stayed yourselves.";
    b=`${trophies} titles, every one true to the charter. The rarest ending for a ${s.name} in a ${r.name}.`;
  } else if(!charterBroken){
    t="You kept the charter.";
    b=`Only ${trophies} title${trophies===1?'':'s'} in a hundred years. But this ${s.name} is still what the founders made it. The rule held.`;
  } else if(trophies>=3){
    t="You won everything. You are no longer yourselves.";
    b=`${trophies} titles bought with compromises. The ${ru.name} rule is a framed relic. The ${r.name} you were belongs to another century.`;
  } else {
    t="You broke the charter and won little anyway.";
    b=`You spent the soul of a ${s.name} chasing the dice, and the dice didn't care. ${trophies} title${trophies===1?'':'s'}, and nothing left that made you different.`;
  }
  document.getElementById("et").textContent=t;
  document.getElementById("eb").textContent=b;
  document.getElementById("ec").textContent=`${r.place} · ${s.name} · Charter: ${ru.name}`;
}

document.getElementById("rp").onclick=()=>location.reload();

showFoundingStep();
</script>
</body>
</html>
